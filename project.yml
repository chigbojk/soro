name: Soro
options:
  bundleIdPrefix: com.jordanchigbo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "1.0.0"

settings:
  base:
    SWIFT_VERSION: "5.0"          # Swift 5 language mode: relaxes strict concurrency for the M1 skeleton
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Portable, ad-hoc signing by default so anyone can `git clone` and build
    # with zero setup. Override with CODE_SIGN_IDENTITY / DEVELOPMENT_TEAM (e.g.
    # via scripts/package.sh's SORO_SIGN_ID / SORO_TEAM_ID) for a stable
    # Apple Development identity that keeps TCC (Mic/Accessibility) grants across rebuilds.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO

targets:
  Soro:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    dependencies:
      - package: WhisperKit
    sources:
      - path: Soro/Soro
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jordanchigbo.soro
        PRODUCT_NAME: Soro
        INFOPLIST_FILE: Soro/Soro/Info.plist
        ENABLE_APP_SANDBOX: NO           # App Sandbox OFF — global event tap + arbitrary-app paste
        LSUIElement: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Soro/Soro/Info.plist
      properties:
        CFBundleName: Soro
        CFBundleDisplayName: Soro
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        LSUIElement: true
        NSHighResolutionCapable: true
        NSMicrophoneUsageDescription: "Soro needs microphone access to capture your voice for dictation."
        NSAccessibilityUsageDescription: "Soro needs accessibility access to detect the global hotkey and insert transcribed text at your cursor."
        NSAppleEventsUsageDescription: "Soro uses Apple Events to insert text and interact with the frontmost app."

  SoroTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Soro/SoroTests
    dependencies:
      - target: Soro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jordanchigbo.soro.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Soro:
    build:
      targets:
        Soro: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SoroTests
